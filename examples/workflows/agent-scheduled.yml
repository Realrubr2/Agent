name: Scheduled Agent

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  agent:
    uses: Realrubr2/Agent/.github/workflows/agent-scheduled.yml@main
    with:
      model: openrouter/z-ai/glm-4.7-flash
      prompt: |
        Review the repository for stale TODO comments and summarize anything that should become an issue or pull request.
    secrets: inherit
