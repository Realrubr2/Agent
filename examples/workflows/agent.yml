name: Agent

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  agent:
    uses: Realrubr2/Agent/.github/workflows/agent.yml@main
    with:
      model: openrouter/z-ai/glm-4.7-flash
      review_model: openrouter/z-ai/glm-4.7-flash
      schedule_model: openrouter/z-ai/glm-4.7-flash
      issues: true
      pull_requests: true # Enables /agent and /renovate on pull request threads.
      scheduled: true
      provider_timeout_ms: "900000"
      schedule_prompt: |
        Review the repository for stale TODO comments and summarize anything that should become an issue or pull request.
    secrets: inherit
