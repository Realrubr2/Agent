name: "Shared Agent"
description: "Run a shared repo agent from GitHub comments, PRs, schedules, and manual workflows"
branding:
  icon: "cpu"
  color: "blue"

inputs:
  model:
    description: "Default OpenRouter model in openrouter/provider/model format"
    required: true
  review_model:
    description: "OpenRouter model for pull request review mode. Defaults to model."
    required: false
  schedule_model:
    description: "OpenRouter model for schedule and workflow_dispatch mode. Defaults to model."
    required: false
  triage_model:
    description: "OpenRouter model for issue triage mode. Defaults to model."
    required: false
  mode:
    description: "Explicit mode override"
    required: false
  prompt:
    description: "Prompt for automated modes, or override prompt for comment modes"
    required: false
  mentions:
    description: "Comma-separated trigger phrases for generic agent comments. Defaults to /agent. /renovate is always recognized on pull request comments."
    required: false
    default: "/agent"
  skills:
    description: "Comma-separated skill allowlist. Defaults to all bundled and repo-local skills."
    required: false
  provider_timeout_ms:
    description: "OpenCode provider request timeout in milliseconds. Defaults to 900000."
    required: false
    default: "900000"
  telemetry_include_prompts:
    description: "Include prompts and model responses in Langfuse telemetry"
    required: false
    default: "false"

runs:
  using: "node24"
  main: "dist/index.js"
