name: shared-agent

on:
  workflow_call:
    inputs:
      model:
        type: string
        required: true
      review_model:
        type: string
        required: false
        default: ""
      schedule_model:
        type: string
        required: false
        default: ""
      triage_model:
        type: string
        required: false
        default: ""
      mode:
        type: string
        required: false
        default: ""
      prompt:
        type: string
        required: false
        default: ""
      mentions:
        type: string
        required: false
        default: "/agent"
      skills:
        type: string
        required: false
        default: ""
      telemetry_include_prompts:
        type: string
        required: false
        default: "false"
      agent_ref:
        type: string
        required: false
        default: "v1"

jobs:
  agent:
    if: |
      github.event_name != 'issue_comment' ||
      startsWith(github.event.comment.body, inputs.mentions) ||
      contains(github.event.comment.body, format(' {0}', inputs.mentions))
    runs-on: ubuntu-latest
    environment: agent
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          path: repo
          fetch-depth: 0

      - name: Checkout shared agent
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: ${{ github.repository_owner }}/Agent
          ref: ${{ inputs.agent_ref }}
          path: .agent-action
          fetch-depth: 1

      - name: Run shared agent
        run: node ../.agent-action/dist/index.js
        working-directory: repo
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_BASE_URL: ${{ secrets.OPENROUTER_BASE_URL }}
          INPUT_MODEL: ${{ inputs.model }}
          INPUT_REVIEW_MODEL: ${{ inputs.review_model }}
          INPUT_SCHEDULE_MODEL: ${{ inputs.schedule_model }}
          INPUT_TRIAGE_MODEL: ${{ inputs.triage_model }}
          INPUT_MODE: ${{ inputs.mode || (github.event_name == 'pull_request' && 'review' || '') }}
          INPUT_PROMPT: ${{ inputs.prompt || (github.event_name == 'pull_request' && 'Review this pull request. Focus on bugs, regressions, missing tests, and maintainability risks.' || '') }}
          INPUT_MENTIONS: ${{ inputs.mentions }}
          INPUT_SKILLS: ${{ inputs.skills }}
          INPUT_TELEMETRY_INCLUDE_PROMPTS: ${{ inputs.telemetry_include_prompts }}
