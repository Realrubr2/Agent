name: shared-agent

on:
  workflow_call:
    inputs:
      model:
        type: string
        required: true
      review_model:
        type: string
        required: false
        default: ""
      schedule_model:
        type: string
        required: false
        default: ""
      triage_model:
        type: string
        required: false
        default: ""
      mode:
        type: string
        required: false
        default: ""
      prompt:
        type: string
        required: false
        default: ""
      issue_prompt:
        type: string
        required: false
        default: "Triage this issue. Summarize the request, identify missing context, and suggest next steps."
      pull_request_prompt:
        type: string
        required: false
        default: "Review this pull request. Focus on bugs, regressions, missing tests, and maintainability risks."
      schedule_prompt:
        type: string
        required: false
        default: "Review the repository for maintenance opportunities and summarize anything that should become an issue or pull request."
      mentions:
        type: string
        required: false
        default: "/agent"
      skills:
        type: string
        required: false
        default: ""
      provider_timeout_ms:
        type: string
        required: false
        default: "900000"
      telemetry_include_prompts:
        type: string
        required: false
        default: "false"
      issues:
        type: boolean
        required: false
        default: true
      pull_requests:
        type: boolean
        required: false
        default: true
      scheduled:
        type: boolean
        required: false
        default: false
    secrets:
      OPENROUTER_API_KEY:
        required: true
      LANGFUSE_PUBLIC_KEY:
        required: true
      LANGFUSE_SECRET_KEY:
        required: true
      LANGFUSE_BASE_URL:
        required: true
      OPENROUTER_BASE_URL:
        required: false
jobs:
  agent:
    if: |
      (
        inputs.issues &&
        (
          github.event_name == 'issues' ||
          (
            github.event_name == 'issue_comment' &&
            !github.event.issue.pull_request &&
            (
              startsWith(github.event.comment.body, inputs.mentions) ||
              contains(github.event.comment.body, format(' {0}', inputs.mentions))
            )
          )
        )
      ) ||
      (
        inputs.pull_requests &&
        (
          github.event_name == 'pull_request' ||
          (
            github.event_name == 'pull_request_review_comment' &&
            (
              startsWith(github.event.comment.body, inputs.mentions) ||
              contains(github.event.comment.body, format(' {0}', inputs.mentions)) ||
              github.event.comment.body == '/renovate' ||
              startsWith(github.event.comment.body, '/renovate ') ||
              contains(github.event.comment.body, ' /renovate ') ||
              endsWith(github.event.comment.body, ' /renovate')
            )
          ) ||
          (
            github.event_name == 'issue_comment' &&
            github.event.issue.pull_request &&
            (
              startsWith(github.event.comment.body, inputs.mentions) ||
              contains(github.event.comment.body, format(' {0}', inputs.mentions)) ||
              github.event.comment.body == '/renovate' ||
              startsWith(github.event.comment.body, '/renovate ') ||
              contains(github.event.comment.body, ' /renovate ') ||
              endsWith(github.event.comment.body, ' /renovate')
            )
          )
        )
      ) ||
      (
        inputs.scheduled &&
        (
          github.event_name == 'schedule' ||
          github.event_name == 'workflow_dispatch'
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Install OpenCode CLI
        run: npm install --global opencode-ai@1.17.0

      - name: Run shared agent
        uses: Realrubr2/Agent@main
        with:
          model: ${{ inputs.model }}
          review_model: ${{ inputs.review_model }}
          schedule_model: ${{ inputs.schedule_model }}
          triage_model: ${{ inputs.triage_model }}
          mode: ${{ inputs.mode }}
          prompt: ${{ inputs.prompt || (github.event_name == 'pull_request' && inputs.pull_request_prompt || github.event_name == 'issues' && inputs.issue_prompt || (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && inputs.schedule_prompt || '') }}
          mentions: ${{ inputs.mentions }}
          skills: ${{ inputs.skills }}
          provider_timeout_ms: ${{ inputs.provider_timeout_ms }}
          telemetry_include_prompts: ${{ inputs.telemetry_include_prompts }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_BASE_URL: ${{ secrets.OPENROUTER_BASE_URL }}
