name: shared-agent-scheduled

on:
  workflow_call:
    inputs:
      model:
        type: string
        required: true
      schedule_model:
        type: string
        required: false
        default: ""
      prompt:
        type: string
        required: true
      skills:
        type: string
        required: false
        default: ""
      telemetry_include_prompts:
        type: string
        required: false
        default: "false"
      agent_ref:
        type: string
        required: false
        default: ""

jobs:
  agent:
    runs-on: ubuntu-latest
    environment: agent
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          path: repo
          fetch-depth: 0

      - name: Checkout shared agent
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: ${{ github.repository_owner }}/Agent
          ref: ${{ inputs.agent_ref || github.workflow_sha }}
          path: .agent-action
          fetch-depth: 1

      - name: Run shared agent
        run: node ../.agent-action/dist/index.js
        working-directory: repo
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_BASE_URL: ${{ secrets.OPENROUTER_BASE_URL }}
          INPUT_MODEL: ${{ inputs.model }}
          INPUT_SCHEDULE_MODEL: ${{ inputs.schedule_model }}
          INPUT_MODE: schedule
          INPUT_PROMPT: ${{ inputs.prompt }}
          INPUT_SKILLS: ${{ inputs.skills }}
          INPUT_TELEMETRY_INCLUDE_PROMPTS: ${{ inputs.telemetry_include_prompts }}
