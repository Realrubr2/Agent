name: shared-agent-scheduled

on:
  workflow_call:
    inputs:
      model:
        type: string
        required: true
      schedule_model:
        type: string
        required: false
        default: ""
      prompt:
        type: string
        required: true
      skills:
        type: string
        required: false
        default: ""
      telemetry_include_prompts:
        type: string
        required: false
        default: "false"
    secrets:
      OPENROUTER_API_KEY:
        required: true
      LANGFUSE_PUBLIC_KEY:
        required: true
      LANGFUSE_SECRET_KEY:
        required: true
      LANGFUSE_BASE_URL:
        required: true
      OPENROUTER_BASE_URL:
        required: false
jobs:
  agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Install OpenCode CLI
        run: npm install --global opencode-ai@1.17.0

      - name: Run shared agent
        uses: Realrubr2/Agent@main
        with:
          model: ${{ inputs.model }}
          schedule_model: ${{ inputs.schedule_model }}
          mode: schedule
          prompt: ${{ inputs.prompt }}
          skills: ${{ inputs.skills }}
          telemetry_include_prompts: ${{ inputs.telemetry_include_prompts }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_BASE_URL: ${{ secrets.OPENROUTER_BASE_URL }}
