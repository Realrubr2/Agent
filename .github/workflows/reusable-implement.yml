name: Reusable Agent Implement

on:
  workflow_call:
    inputs:
      agent_repository:
        description: Repository that contains the reusable agent.
        required: false
        type: string
        default: realrubr2/Agent
      agent_ref:
        description: Branch, tag, or SHA of the reusable agent repository.
        required: false
        type: string
        default: main
      allowed_associations:
        description: Comma-separated GitHub author associations allowed to run the agent.
        required: false
        type: string
        default: OWNER,MEMBER,COLLABORATOR
    secrets:
      OPENROUTER_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      LANGFUSE_PUBLIC_KEY:
        required: false
      LANGFUSE_SECRET_KEY:
        required: false
      LANGFUSE_HOST:
        required: false

permissions:
  id-token: write
  contents: write
  issues: write
  pull-requests: write
  actions: read

jobs:
  implement:
    if: >
      !github.event.issue.pull_request &&
      github.event.comment.body &&
      (
        contains(github.event.comment.body, '/agent approve') ||
        contains(github.event.comment.body, '/opencode approve')
      )
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || secrets.OPENAI_API_KEY || vars.OPENROUTER_API_KEY || vars.OPENAI_API_KEY }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY || vars.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY || vars.LANGFUSE_SECRET_KEY }}
      LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST || vars.LANGFUSE_HOST }}
      AGENT_ALLOWED_ASSOCIATIONS: ${{ inputs.allowed_associations }}
      provider_model: ${{ vars.provider_model }}
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout reusable agent
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.agent_repository }}
          ref: ${{ inputs.agent_ref }}
          path: .agent

      - name: Ignore reusable agent checkout
        run: echo ".agent/" >> .git/info/exclude

      - name: Validate required environment
        run: node .agent/src/agent-glue.mjs require-env

      - name: Install bundled skills
        run: |
          mkdir -p "$HOME/.opencode/skills"
          cp -R .agent/skills/code-review "$HOME/.opencode/skills/code-review"
          cp -R .agent/skills/control-ui "$HOME/.opencode/skills/control-ui"
          cp -R .agent/skills/mise-typescript-starter "$HOME/.opencode/skills/mise-typescript-starter"

      - name: Prepare implementation prompt
        id: prepare
        run: node .agent/src/agent-glue.mjs prepare-implement

      - name: Trace implementation start
        run: node .agent/src/agent-glue.mjs trace implementation_start ok

      - name: Run Opencode implementation
        uses: anomalyco/opencode/github@latest
        env:
          OPENROUTER_API_KEY: ${{ env.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        with:
          model: ${{ env.provider_model }}
          prompt: ${{ steps.prepare.outputs.prompt }}
          use_github_token: true

      - name: Build PR body
        id: pr_body
        run: node .agent/src/agent-glue.mjs build-pr-body

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ github.token }}
          commit-message: "feat(agent): implement issue #${{ steps.prepare.outputs.issue_number }}"
          branch: ${{ steps.prepare.outputs.branch }}
          title: "Agent implementation for #${{ steps.prepare.outputs.issue_number }}"
          body-path: ${{ steps.pr_body.outputs.body_path }}

      - name: Post implementation status
        if: always()
        env:
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
        run: node .agent/src/agent-glue.mjs post-implementation

      - name: Trace implementation result
        if: always()
        run: node .agent/src/agent-glue.mjs trace implementation_result ${{ job.status }}
