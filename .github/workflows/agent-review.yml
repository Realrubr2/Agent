name: shared-agent-review

on:
  workflow_call:
    inputs:
      model:
        type: string
        required: true
      review_model:
        type: string
        required: false
        default: ""
      prompt:
        type: string
        required: false
        default: "Review this pull request. Focus on bugs, regressions, missing tests, and maintainability risks."
      skills:
        type: string
        required: false
        default: ""
      telemetry_include_prompts:
        type: string
        required: false
        default: "false"
jobs:
  agent:
    runs-on: ubuntu-latest
    environment: agent
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Run shared agent
        uses: Realrubr2/Agent@main
        with:
          model: ${{ inputs.model }}
          review_model: ${{ inputs.review_model }}
          mode: review
          prompt: ${{ inputs.prompt }}
          skills: ${{ inputs.skills }}
          telemetry_include_prompts: ${{ inputs.telemetry_include_prompts }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_BASE_URL: ${{ secrets.OPENROUTER_BASE_URL }}
